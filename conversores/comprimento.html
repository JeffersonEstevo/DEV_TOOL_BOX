<div class="tool-container">
    <header class="tool-header">
        <h2>Conversor de Comprimento</h2>
        <p>Digite o valor em qualquer um dos campos abaixo para converter simultaneamente entre os sistemas métrico e imperial em tempo real.</p>
    </header>

    <div class="generator-workspace comprimento-workspace">
        <div class="comprimento-grid">
            
            <div class="comprimento-field">
                <label for="comp-km">Quilômetro (km)</label>
                <input type="number" id="comp-km" placeholder="0" step="any">
            </div>

            <div class="comprimento-field">
                <label for="comp-m">Metro (m)</label>
                <input type="number" id="comp-m" placeholder="0" step="any">
            </div>

            <div class="comprimento-field">
                <label for="comp-cm">Centímetro (cm)</label>
                <input type="number" id="comp-cm" placeholder="0" step="any">
            </div>

            <div class="comprimento-field">
                <label for="comp-mm">Milímetro (mm)</label>
                <input type="number" id="comp-mm" placeholder="0" step="any">
            </div>

            <div class="comprimento-field">
                <label for="comp-milha">Milha (mi)</label>
                <input type="number" id="comp-milha" placeholder="0" step="any">
            </div>

            <div class="comprimento-field">
                <label for="comp-jarda">Jarda (yd)</label>
                <input type="number" id="comp-jarda" placeholder="0" step="any">
            </div>

            <div class="comprimento-field">
                <label for="comp-pe">Pé (ft)</label>
                <input type="number" id="comp-pe" placeholder="0" step="any">
            </div>

            <div class="comprimento-field">
                <label for="comp-polegada">Polegada (in)</label>
                <input type="number" id="comp-polegada" placeholder="0" step="any">
            </div>

        </div>
    </div>

    <div class="action-bar border-top-bar" style="justify-content: center;">
        <button id="btn-limpar-comprimento" class="btn btn-success">
            <i class="bi bi-trash3-fill"></i> Limpar Campos
        </button>
    </div>
</div>

<script src="static/js/conversores/comprimento.js"></script>
