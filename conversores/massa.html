<div class="tool-container">
    <header class="tool-header">
        <h2>Conversor de Massa / Peso</h2>
        <p>Insira o valor em qualquer um dos campos abaixo para convertê-lo instantaneamente entre diferentes unidades de massa dos sistemas métrico, imperial e comercial.</p>
    </header>

    <div class="generator-workspace massa-workspace">
        <div class="massa-grid">
            
            <div class="massa-field">
                <label for="massa-t">Tonelada (t)</label>
                <input type="number" id="massa-t" placeholder="0" step="any">
            </div>

            <div class="massa-field">
                <label for="massa-kg">Quilograma (kg)</label>
                <input type="number" id="massa-kg" placeholder="0" step="any">
            </div>

            <div class="massa-field">
                <label for="massa-g">Grama (g)</label>
                <input type="number" id="massa-g" placeholder="0" step="any">
            </div>

            <div class="massa-field">
                <label for="massa-mg">Miligrama (mg)</label>
                <input type="number" id="massa-mg" placeholder="0" step="any">
            </div>

            <div class="massa-field">
                <label for="massa-lb">Libra (lb)</label>
                <input type="number" id="massa-lb" placeholder="0" step="any">
            </div>

            <div class="massa-field">
                <label for="massa-oz">Onça (oz)</label>
                <input type="number" id="massa-oz" placeholder="0" step="any">
            </div>

            <div class="massa-field">
                <label for="massa-arroba">Arroba (@)</label>
                <input type="number" id="massa-arroba" placeholder="0" step="any">
            </div>

            <div class="massa-field">
                <label for="massa-quilate">Quilate (ct)</label>
                <input type="number" id="massa-quilate" placeholder="0" step="any">
            </div>

        </div>
    </div>

    <div class="action-bar border-top-bar" style="justify-content: center;">
        <button id="btn-limpar-massa" class="btn btn-success">
            <i class="bi bi-trash3-fill"></i> Limpar Campos
        </button>
    </div>
</div>

<script src="static/js/conversores/massa.js"></script>
