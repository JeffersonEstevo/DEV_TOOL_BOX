<div class="tool-container">
    <header class="tool-header">
        <h2>Gerador e Validador de UUID</h2>
        <p>Gere identificadores únicos universais (UUID v4 ou v7) aleatórios e cronológicos ou valide sua estrutura e versão.</p>
    </header>

    <!-- Estrutura de Abas no Padrão Unificado -->
    <div class="rede-tabs">
        <button class="tab-btn active" onclick="alternarAbaUUID('aba-uuid-gerar')">
            <i class="bi bi-gear-fill"></i> Gerar UUID
        </button>
        <button class="tab-btn" onclick="alternarAbaUUID('aba-uuid-validar')">
            <i class="bi bi-shield-check"></i> Validar UUID
        </button>
    </div>

    <!-- ABA 1: GERAR UUID -->
    <div id="aba-uuid-gerar" class="generator-workspace uuid-workspace tab-content active">
        <div class="generator-options" style="flex-direction: column; gap: 1rem;">
            <div style="display: flex; gap: 1.5rem; justify-content: center; font-size: 0.95rem; color: var(--text-main);">
                <label style="cursor: pointer; display: flex; align-items: center; gap: 0.3rem;">
                    <input type="radio" name="versao-uuid" value="v4" checked> Versão 4 (Aleatório)
                </label>
                <label style="cursor: pointer; display: flex; align-items: center; gap: 0.3rem;">
                    <input type="radio" name="versao-uuid" value="v7"> Versão 7 (Cronológico)
                </label>
            </div>
            
            <label class="checkbox-container">
                <input type="checkbox" id="uuid-maiusculo">
                <span class="checkmark"></span>
                Gerar em letras maiúsculas
            </label>
        </div>

        <div class="generator-output-box">
            <input type="text" id="uuid-resultado" readonly placeholder="Clique em Gerar UUID">
        </div>
    </div>

    <!-- ABA 2: VALIDAR UUID -->
    <div id="aba-uuid-validar" class="generator-workspace uuid-workspace tab-content">
        <div class="generator-options" style="flex-direction: column; gap: 0.5rem; align-items: center;">
            <label style="font-size: 0.95rem; font-weight: 600; color: var(--text-main);">Digite o UUID para validação</label>
        </div>

        <div class="generator-output-box">
            <input type="text" id="uuid-input-validar" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" maxlength="36" autocomplete="off" style="color: var(--text-main);">
        </div>
        
        <!-- Box de Feedback Visual da Validação -->
        <div id="uuid-validation-feedback" class="validation-feedback neutral" style="margin-top: 1rem; font-weight: 600; font-size: 0.95rem;">
            Aguardando entrada...
        </div>
    </div>

    <!-- Barra de Ações Dinâmica -->
    <div class="action-bar border-top-bar">
        <!-- Botões de Geração -->
        <div id="grupo-uuid-acoes-gerar" class="grupo-acoes">
            <button id="btn-gerar-uuid" class="btn btn-primary">
                <i class="bi bi-gear-fill"></i> Gerar UUID
            </button>
            <button id="btn-copiar-uuid" class="btn btn-success">
                <i class="bi bi-clipboard"></i> Copiar UUID
            </button>
        </div>

        <!-- Botões de Validação -->
        <div id="grupo-uuid-acoes-validar" class="grupo-acoes" style="display: none;">
            <button id="btn-copiar-validar-uuid" class="btn btn-primary">
                <i class="bi bi-clipboard"></i> Copiar UUID
            </button>
            <button id="btn-limpar-validar-uuid" class="btn btn-success">
                <i class="bi bi-trash3-fill"></i> Limpar
            </button>
        </div>
        
        <span id="uuid-generator-alert" class="toast-alert hidden">
            <i class="bi bi-check-circle-fill"></i> Copiado com sucesso!
        </span>
    </div>
</div>

<script src="static/js/geradores/gerar_uuid.js"></script>
