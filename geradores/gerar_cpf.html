<div class="tool-container">
    <header class="tool-header">
        <h2>Gerador e Validador de CPF</h2>
        <p>Gere números de CPF válidos para testes de software ou valide estruturas de CPF de forma instantânea.</p>
    </header>

    <!-- Estrutura de Abas no Padrão Unificado -->
    <div class="rede-tabs">
        <button class="tab-btn active" onclick="alternarAbaCPF('aba-gerar')">
            <i class="bi bi-gear-fill"></i> Gerar CPF
        </button>
        <button class="tab-btn" onclick="alternarAbaCPF('aba-validar')">
            <i class="bi bi-shield-check"></i> Validar CPF
        </button>
    </div>

    <!-- ABA 1: GERAR CPF -->
    <div id="aba-gerar" class="generator-workspace cpf-workspace tab-content active">
        <div class="generator-options">
            <label class="checkbox-container">
                <input type="checkbox" id="cpf-formatar" checked>
                <span class="checkmark"></span>
                Gerar com pontuação (Ex: 000.000.000-00)
            </label>
        </div>

        <div class="generator-output-box">
            <input type="text" id="cpf-resultado" readonly placeholder="Clique em Gerar CPF">
        </div>
    </div>

    <!-- ABA 2: VALIDAR CPF -->
    <div id="aba-validar" class="generator-workspace cpf-workspace tab-content">
        <div class="generator-options" style="flex-direction: column; gap: 0.5rem; align-items: center;">
            <label style="font-size: 0.95rem; font-weight: 600; color: var(--text-main);">Digite o CPF para validação</label>
        </div>

        <div class="generator-output-box">
            <input type="text" id="cpf-input-validar" placeholder="000.000.000-00" maxlength="14" autocomplete="off" style="color: var(--text-main);">
        </div>
        
        <!-- Box de Feedback Visual da Validação -->
        <div id="cpf-validation-feedback" class="validation-feedback neutral" style="margin-top: 1rem; font-weight: 600; font-size: 0.95rem;">
            Aguardando entrada...
        </div>
    </div>

    <!-- Barra de Ações Dinâmica -->
    <div class="action-bar border-top-bar">
        <!-- Botões de Geração (Visíveis por padrão) -->
        <div id="grupo-acoes-gerar" class="grupo-acoes">
            <button id="btn-gerar-cpf" class="btn btn-primary">
                <i class="bi bi-gear-fill"></i> Gerar CPF
            </button>
            <button id="btn-copiar-cpf" class="btn btn-success">
                <i class="bi bi-clipboard"></i> Copiar CPF
            </button>
        </div>

        <!-- Botões de Validação (Ocultados por padrão) -->
        <div id="grupo-acoes-validar" class="grupo-acoes" style="display: none;">
            <button id="btn-copiar-validar-cpf" class="btn btn-primary">
                <i class="bi bi-clipboard"></i> Copiar CPF
            </button>
            <button id="btn-limpar-validar-cpf" class="btn btn-success">
                <i class="bi bi-trash3-fill"></i> Limpar
            </button>
        </div>
        
        <span id="cpf-generator-alert" class="toast-alert hidden">
            <i class="bi bi-check-circle-fill"></i> Copiado com sucesso!
        </span>
    </div>
</div>

<script src="static/js/geradores/gerar_cpf.js"></script>
