<div class="tool-container">
    <header class="tool-header">
        <h2>Editor & Preview HTML/CSS em Tempo Real</h2>
        <p>Escreva ou cole seu código abaixo para visualizar o resultado renderizado instantaneamente, sem precisar abrir o editor de código.</p>
    </header>

    <div class="generator-workspace webdev-workspace" style="max-width: 100% !important; padding: 1rem 2rem !important;">
        
        <!-- Grid: Código vs Resultado -->
        <div class="grid-layout-preview" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: stretch; min-height: 500px;">
            
            <!-- Coluna 1: Entradas de Código -->
            <div class="painel-editores" style="display: flex; flex-direction: column; gap: 1rem;">
                
                <div class="campo-editor">
                    <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-main);">Código HTML</label>
                    <textarea id="live-html-input" placeholder="<h1>Hello World</h1><p>Comece a digitar aqui...</p>" style="width: 100%; height: 220px; font-family: monospace; font-size: 0.85rem; padding: 0.6rem; border-radius: var(--radius); border: 1px solid var(--border-color); background-color: var(--bg-sidebar); color: var(--text-main); resize: vertical; box-sizing: border-box;"></textarea>
                </div>

                <div class="campo-editor">
                    <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-main);">Código CSS</label>
                    <textarea id="live-css-input" placeholder="h1 {color: #2563eb;}" style="width: 100%; height: 220px; font-family: monospace; font-size: 0.85rem; padding: 0.6rem; border-radius: var(--radius); border: 1px solid var(--border-color); background-color: var(--bg-sidebar); color: var(--text-main); resize: vertical; box-sizing: border-box;"></textarea>
                </div>

            </div>

            <!-- Coluna 2: O Iframe de Renderização -->
            <div class="painel-resultado" style="display: flex; flex-direction: column;">
                <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-main);">Resultado Visual (Preview)</label>
                <div style="flex: 1; border: 1px solid var(--border-color); border-radius: var(--radius); background-color: #ffffff; overflow: hidden; min-height: 460px;">
                    <!-- O iframe funciona como uma aba isolada do navegador -->
                    <iframe id="live-preview-frame" sandbox="allow-scripts" style="width: 100%; height: 100%; border: none; background: #ffffff;"></iframe>
                </div>
            </div>

        </div>
    </div>

    <div class="action-bar border-top-bar" style="justify-content: center; gap: 1rem;">
        <button id="btn-abrir-nova-aba" class="btn btn-primary">
            <i class="bi bi-box-arrow-up-right"></i> Ver em Nova Aba
        </button>
        <button id="btn-limpar-preview" class="btn btn-secondary">
            <i class="bi bi-trash"></i> Limpar Tudo
        </button>
    </div>
</div>

<script src="static/js/web_dev/preview.js"></script>
