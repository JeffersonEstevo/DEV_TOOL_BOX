<div class="tool-container workspace-largo">
    <header class="tool-header">
        <h2>Remover Quebras de Linha</h2>
        <p>Transforme textos paragrafados ou copiados de PDFs em um bloco de texto contínuo em apenas um clique.</p>
    </header>

    <div class="tool-grid">
        <div class="field-group">
            <label for="original-text">Texto Entrada:</label>
            <textarea id="original-text" rows="10" placeholder="Digite ou cole seu texto com quebras de linha aqui..."></textarea>
        </div>

        <div class="field-group">
            <label for="modified-text">Texto Sem Quebras:</label>
            <textarea id="modified-text" rows="10" placeholder="O resultado unificado aparecerá aqui..." readonly></textarea>
        </div>
    </div>

    <div class="action-bar">
        <button id="remove-linebreaks-button" class="btn btn-primary">
            <i class="bi bi-text-wrap"></i> Remover Quebras de Texto
        </button>
    </div>

    <div class="action-bar border-top-bar">
        <button id="clean-linebreaks-button" class="btn btn-secondary">Limpar</button>
        <button id="copy-linebreaks-button" class="btn btn-success">
            <i class="bi bi-clipboard"></i> Copiar Resultado
        </button>
        <span id="copy-linebreaks-alert" class="toast-alert hidden">
            <i class="bi bi-check-circle-fill"></i> Copiado com sucesso!
        </span>
    </div>
</div>

<script src="static/js/texto/remover_quebras.js"></script>
