<div class="tool-container workspace-largo">
    <header class="tool-header">
        <h2>Remover Espaços Extra</h2>
        <p>Elimine espaços duplicados, quebras de linha sobressalentes e espaçamentos invisíveis do seu texto.</p>
    </header>

    <div class="tool-grid">
        <div class="field-group">
            <label for="original-text">Texto Entrada:</label>
            <textarea id="original-text" rows="10" placeholder="Digite ou cole seu texto com espaços extras aqui..."></textarea>
        </div>

        <div class="field-group">
            <label for="modified-text">Texto Final:</label>
            <textarea id="modified-text" rows="10" placeholder="O resultado limpo aparecerá aqui..." readonly></textarea>
        </div>
    </div>

    <div class="action-bar">
        <button id="remove-space-button" class="btn btn-primary">
            <i class="bi bi-distribute-horizontal"></i> Remover Espaços Extra
        </button>
    </div>

    <div class="action-bar border-top-bar">
        <button id="clean-spaces-button" class="btn btn-secondary">Limpar</button>
        <button id="copy-spaces-button" class="btn btn-success">
            <i class="bi bi-clipboard"></i> Copiar Resultado
        </button>
        <span id="copy-spaces-alert" class="toast-alert hidden">
            <i class="bi bi-check-circle-fill"></i> Copiado com sucesso!
        </span>
    </div>
</div>

<script src="static/js/texto/remover_espacos.js"></script>
