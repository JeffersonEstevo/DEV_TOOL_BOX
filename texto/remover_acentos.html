<div class="tool-container workspace-largo">
    <header class="tool-header">
        <h2>Remover Acentos de Texto</h2>
        <p>Elimine diacríticos, acentos e caracteres especiais de normalização do seu texto instantaneamente.</p>
    </header>

    <div class="tool-grid">
        <div class="field-group">
            <label for="original-text">Texto Entrada:</label>
            <textarea id="original-text" rows="10" placeholder="Digite ou cole seu texto com acentos aqui..."></textarea>
        </div>

        <div class="field-group">
            <label for="modified-text">Texto Sem Acentos:</label>
            <textarea id="modified-text" rows="10" placeholder="O resultado sem acentuação aparecerá aqui..." readonly></textarea>
        </div>
    </div>

    <div class="action-bar">
        <button id="remove-accents-button" class="btn btn-primary">
            <i class="bi bi-type-strikethrough"></i> Remover Acentos
        </button>
    </div>

    <div class="action-bar border-top-bar">
        <button id="clean-accents-button" class="btn btn-secondary">Limpar</button>
        <button id="copy-accents-button" class="btn btn-success">
            <i class="bi bi-clipboard"></i> Copiar Resultado
        </button>
        <span id="copy-accents-alert" class="toast-alert hidden">
            <i class="bi bi-check-circle-fill"></i> Copiado com sucesso!
        </span>
    </div>
</div>

<script src="static/js/texto/remover_acentos.js"></script>
