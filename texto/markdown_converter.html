<div class="tool-container workspace-largo">
    <header class="tool-header">
        <h2>Conversor de Markdown para HTML</h2>
        <p>Converta títulos, listas, tabelas, blocos de código e links de Markdown em HTML limpo instantaneamente.</p>
    </header>

    <div class="tool-grid">
        <div class="field-group">
            <label for="markdown-input">Cole ou Digite seu Markdown:</label>
            <textarea id="markdown-input" class="markdown-textarea" placeholder="# Exemplo de Título&#10;&#10;Escreva seu texto aqui...&#10;- Item 1&#10;- Item 2"></textarea>
        </div>

        <div class="field-group">
            <label for="markdown-output-container">Código HTML Resultante:</label>
            <div class="markdown-output-container">
                <pre id="markdown-output" class="markdown-text-area"></pre>
            </div>
        </div>
    </div>

    <div class="action-bar border-top-bar">
        <button id="clean-markdown-button" class="btn btn-secondary">Limpar</button>
        <button id="copy-markdown-button" class="btn btn-success">
            <i class="bi bi-clipboard"></i> Copiar HTML
        </button>
        <span id="copy-markdown-alert" class="toast-alert hidden">
            <i class="bi bi-check-circle-fill"></i> Copiado com sucesso!
        </span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="static/js/texto/markdown_converter.js"></script>
